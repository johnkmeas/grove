name: Dev Preview

on:
  push:
    branches:
      - 'feature/**'
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build and deploy to dev theme
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint JS
        run: pnpm lint:js

      - name: Lint SCSS
        run: pnpm lint:scss

      - name: Validate schemas
        run: pnpm validate-schemas

      - name: Check for breaking schema changes
        run: pnpm schema-diff --base HEAD~1
        continue-on-error: true

      - name: Generate tokens
        run: pnpm generate-tokens

      - name: Build
        run: pnpm build

      - name: Shopify Theme Check
        run: pnpm theme-check shopify/
        continue-on-error: false

      - name: Deploy to dev theme
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
        run: |
          npx @shopify/cli theme push \
            --store ${{ secrets.SHOPIFY_STORE }} \
            --theme ${{ secrets.DEV_THEME_ID }} \
            --path shopify/ \
            --allow-live

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🌿 Grove Preview\n\nTheme preview deployed: https://${{ secrets.SHOPIFY_STORE }}/?\\_bt=${{ secrets.DEV_THEME_ID }}\n\n*Built from \`${{ github.head_ref }}\` at ${{ github.sha }}*`
            })
